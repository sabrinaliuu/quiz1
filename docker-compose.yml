services:
  frontend:
    build: ./frontend
    container_name: webgis-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - wmts
      - cesium
    env_file:
      - ./frontend/.env

  wmts:
    image: maptiler/tileserver-gl
    container_name: tileserver-gl
    ports:
      - "8080:8080"
    volumes:
      - ./wmts-server/data:/data

  cesium:
    image: nginx:alpine 
    container_name: cesium-server
    ports:
      - "8081:80"
    volumes:
      - ./cesium-server/terrain:/usr/share/nginx/html/terrain
      - ./cesium-server/building:/usr/share/nginx/html/building
      - ./cesium-server/cors.conf:/etc/nginx/conf.d/default.conf